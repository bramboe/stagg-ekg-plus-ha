set_schedule:
  name: Set schedule
  description: Set scheduled time/temperature and optionally enable schedule.
  fields:
    hour:
      description: Hour in 24h format (0-23)
      example: 7
      required: true
      selector:
        number:
          min: 0
          max: 23
    minute:
      description: Minute (0-59)
      example: 30
      required: true
      selector:
        number:
          min: 0
          max: 59
    temperature_c:
      description: Target temperature in Celsius. Provide temperature_c or temperature_f.
      example: 90
      selector:
        number:
          min: 40
          max: 100
          unit_of_measurement: "°C"
    temperature_f:
      description: Target temperature in Fahrenheit (optional alternative to temperature_c)
      example: 203
      selector:
        number:
          min: 104
          max: 212
          unit_of_measurement: "°F"
    enable:
      description: Enable schedule after setting it (default true)
      example: true
      selector:
        boolean:
    daily:
      description: Repeat the schedule daily instead of once (default false)
      example: false
      selector:
        boolean:
    entry_id:
      description: Optional config entry id (needed if multiple kettles)
      example: 1234567890abcdef

disable_schedule:
  name: Disable schedule
  description: Disable scheduled start on the kettle.
  fields:
    entry_id:
      description: Optional config entry id (needed if multiple kettles)
      example: 1234567890abcdef

update_schedule:
  name: Update schedule
  description: Apply the current schedule time/temp/mode from entities to the kettle.
  fields:
    entry_id:
      description: Optional config entry id (needed if multiple kettles)
      example: 1234567890abcdef

heat_to:
  name: Heat to temperature
  description: Set the target temperature and start heating in one call.
  fields:
    temperature:
      description: Target temperature in Celsius (40-100)
      example: 96
      required: true
      selector:
        number:
          min: 40
          max: 100
          unit_of_measurement: "°C"
    entry_id:
      description: Optional config entry id (needed if multiple kettles)
      example: 1234567890abcdef

play_chime:
  name: Play chime
  description: Play a chime on the kettle's buzzer (e.g. as a "tea is ready" notification).
  fields:
    pattern:
      description: Chime pattern
      example: beep
      default: beep
      selector:
        select:
          options:
            - beep
            - double_beep
            - alert
            - error
            - sos
    entry_id:
      description: Optional config entry id (needed if multiple kettles)
      example: 1234567890abcdef

send_cli:
  name: Send CLI command
  description: Send a raw HTTP CLI command to the kettle (for testing). Call with return response to get the raw CLI text back.
  fields:
    command:
      description: CLI command string (e.g. fwinfo, temp, buz sos, prtsettings)
      example: fwinfo
      required: true
      selector:
        text:
    entry_id:
      description: Optional config entry id (needed if multiple kettles)
      example: 1234567890abcdef
